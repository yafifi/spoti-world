<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎶 spoti-world 🗺️</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="login-page">
        <h1>🎶 spoti-world 🗺️</h1>
        <p>Discover where in the world your music comes from.</p>
       
        <div>
            <button id="login-button">
                Login with Spotify
            </button>
        </div>
    </div>

    <div id="analysis-page" style="display:none;">
        <h1> Welcome to 🎶 spoti-world 🗺️ </h1>

        <div>
            <button id="analyzeTopTracks-button">Top Tracks</button>
            <button id="analyzeTopArtists-button">Top Artists</button>
        </div>
    </div>

    <div id="results-page" style="display:none;">
        <h1> 🎶 spoti-world 🗺️ </h1>
        <h1> results </h1>

        <div>
            <div id="list-container"></div>
            <button id="back-to-analysis-button">back to analysis options</button>
        </div>
    </div>


    <script type="module" src="/src/main.js"></script>
</body>

</html>
